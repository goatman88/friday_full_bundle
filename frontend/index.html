<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Friday Frontend</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
      .container { max-width: 760px; margin: 36px auto; padding: 16px; }
      pre { background: #f4f4f4; padding: 8px 10px; border-radius: 6px; }
      button { padding: 6px 10px; }
      #status { font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Friday Frontend</h1>

      <p>Backend base <code id="base">(resolves from VITE_BACKEND_URL)</code></p>
      <p>Status: <span id="status">—</span></p>

      <button id="ping">Ping backend</button>
      <pre id="out">(click “Ping backend”)</pre>

      <hr />

      <div>
        <h3>Ask (wired to POST /api/ask)</h3>
        <form id="ask-form">
          <input id="ask-input" placeholder="what did the fox do?" />
          <button type="submit">Ask</button>
        </form>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
