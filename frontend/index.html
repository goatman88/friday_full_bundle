<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friday Frontend</title>
  </head>
  <body>
    <div class="container">
      <h1>Friday Frontend</h1>

      <p id="status" style="font-family: monospace; opacity: .8;">Status: —</p>

      <button id="ping">Ping backend</button>
      <pre id="out" style="margin-top:12px;">(click "Ping backend")</pre>

      <hr />

      <div>
        <h3>Ask (wired to POST /api/ask)</h3>
        <form id="ask-form">
          <input id="ask-input" placeholder="what did the fox do?" />
          <button type="submit">Ask</button>
        </form>
        <pre id="ask-out" style="margin-top:8px;"></pre>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
