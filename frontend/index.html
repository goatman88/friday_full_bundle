<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friday Frontend</title>
    <style>
      body{font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px;}
      .muted{opacity:.7;font-family:monospace}
      pre{background:#f5f5f7;padding:8px;border-radius:6px}
    </style>
  </head>
  <body>
    <h1>Friday Frontend</h1>
    <p class="muted" id="base"></p>
    <p>Status: <span id="status" class="muted">—</span></p>

    <button id="ping">Ping backend</button>
    <pre id="out">(click “Ping backend”)</pre>

    <hr />
    <div>
      <h3>Ask (wired to POST /api/ask)</h3>
      <form id="ask-form">
        <input id="ask-input" placeholder="what did the fox do?"/>
        <button type="submit">Ask</button>
      </form>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
