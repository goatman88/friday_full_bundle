<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Friday Frontend</title>
  </head>
  <body>
    <div id="app" style="max-width: 960px; margin: 24px auto; font-family: system-ui, sans-serif;">
      <h1>Friday Frontend</h1>
      <div> Status: <span id="status">checking…</span> </div>

      <h3>/health</h3>
      <pre id="healthBox">loading…</pre>

      <h3>/api/health</h3>
      <pre id="apiHealthBox">loading…</pre>

      <h3>Ask (wired to POST /api/ask)</h3>
      <div style="display:flex; gap:8px;">
        <input id="q" placeholder="what did the fox do?" style="flex:1;padding:8px;">
        <button id="askBtn">Ask</button>
        <select id="latencySel" title="Latency mode">
          <option value="">Studio (default)</option>
          <option value="balanced">Live Chat</option>
          <option value="ultra">Ultra-fast</option>
        </select>
      </div>
      <h4>Answer</h4>
      <pre id="answer"></pre>

      <hr>

      <h3>Camera</h3>
      <div style="display:flex; gap:12px; align-items:center;">
        <button id="startCamBtn">Start Camera</button>
        <button id="snapBtn">Snap</button>
        <canvas id="snapCanvas" width="320" height="240" style="border:1px solid #ddd"></canvas>
      </div>
      <video id="cam" playsinline autoplay muted style="width:320px; display:block; margin-top:8px; background:#000;"></video>

      <hr>

      <h3>Realtime</h3>
      <div style="display:flex; gap:12px; align-items:center;">
        <button id="rtServerBtn">Start via Server (secure)</button>
        <button id="rtDirectBtn">Start Direct (dev)</button>
        <select id="rtLatencySel">
          <option value="">Studio</option>
          <option value="balanced">Live Chat</option>
          <option value="ultra">Ultra-fast</option>
        </select>
      </div>

      <pre id="rtLog" style="margin-top:12px; height:140px; overflow:auto; background:#f7f7f7; padding:8px;"></pre>
      <audio id="rtAudio" autoplay></audio>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
