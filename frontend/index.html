<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friday Frontend</title>
  </head>
  <body>
    <div style="max-width: 760px; margin: 40px auto; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;">
      <h1>Friday Frontend</h1>

      <button id="ping" style="padding:6px 10px;">Ping backend</button>

      <div style="margin: 16px 0;">
        <label for="q"><strong>Ask Friday</strong></label>
        <div style="display:flex; gap:8px; margin-top:6px;">
          <input id="q" placeholder="Type a question…" style="flex:1; padding:8px;" />
          <button id="ask" style="padding:8px 12px;">Ask</button>
        </div>
      </div>

      <pre id="out" style="background:#f3f3f3; padding:12px; min-height:44px;"></pre>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
