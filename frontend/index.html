<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friday Frontend</title>
    <style>
      body { font-family: system-ui, sans-serif; }
      .container { max-width: 720px; margin: 2rem auto; }
      pre { background: #f2f2f2; padding: .75rem 1rem; border-radius: 6px; }
      input { width: 70%; padding: .5rem; }
      button { padding: .45rem .8rem; }
      .bar { height: 20px; background: #1e293b; border-radius: 4px; margin: 8px 0; }
      #base { font-family: ui-monospace, Menlo, monospace; opacity: .8; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Friday Frontend</h1>

      <p id="base"></p>

      <button id="ping">Ping backend</button>

      <pre id="out" style="margin-top:12px;">(click “Ping backend”)</pre>

      <hr />

      <div>
        <h3>/health</h3>
        <div class="bar"></div>
        <h3>/api/health</h3>
        <div class="bar"></div>

        <h3>Ask (wired to POST /api/ask)</h3>
        <form id="ask-form">
          <input id="ask-input" placeholder="what did the fox do?" />
          <button type="submit">Ask</button>
        </form>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
