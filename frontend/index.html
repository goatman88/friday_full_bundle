<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friday Frontend</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; }
      .container { max-width: 720px; margin: 0 auto; }
      h1 { margin-bottom: 8px; }
      #status { padding: 8px 10px; background: #f4f4f4; border-radius: 6px; margin: 10px 0 18px; }
      #out { background:#111; color:#e6e6e6; padding:12px; border-radius:8px; min-height: 60px; }
      #out [data-type="error"] { color: #ff9e9e; }
      .row { display: flex; gap: .5rem; margin-top: .5rem; }
      input[type="text"] { flex: 1; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px; }
      button { padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; }
      button:hover { background: #f7f7f7; }
      code { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Friday Frontend</h1>

      <div id="status">Ready</div>

      <div>Backend base: <code id="base"></code></div>

      <div class="row" style="margin-top:10px;">
        <button id="ping">Ping backend</button>
      </div>

      <pre id="out" style="margin-top:12px;">(click “Ping backend”)</pre>

      <hr style="margin:24px 0;" />

      <div>
        <h3>Ask (wired to POST /api/ask)</h3>
        <div class="row">
          <input id="ask" type="text" placeholder="what did the fox do?" />
          <button id="askBtn" type="button">Ask</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
