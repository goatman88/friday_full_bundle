services:
  # Backend (FastAPI)
  - name: friday-backend
    type: web
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    branch: mtw27-client

  # Frontend (Vite static)
  - name: friday-frontend
    type: static             # not "static_site"
    env: static
    plan: free
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    autoDeploy: true
    branch: mtw27-client
    envVars:
      - key: VITE_BACKEND_URL
        value: https://friday-backend-XXXXX.onrender.com


