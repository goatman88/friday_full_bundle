services:
  - type: web
    name: friday-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.app:app --host 0.0.0.0 --port 10000

  - type: web
    name: friday-frontend
    env: node
    rootDir: friday-frontend
    buildCommand: |
      npm install
      npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        value: https://friday-backend.onrender.com/api

