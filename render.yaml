services:
  # 1) FastAPI backend
  - type: web
    name: friday-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11

  # 2) Vite static frontend
  - type: static
    name: friday-frontend
    # Write .env.production with the backend URL + /api, then build
    buildCommand: >
      echo BACKEND_BASE=$BACKEND_BASE &&
      echo VITE_API_BASE=$BACKEND_BASE/api > friday-frontend/.env.production &&
      npm ci --prefix friday-frontend &&
      npm run build --prefix friday-frontend
    staticPublishPath: friday-frontend/dist
    envVars:
      # Resolve the running backend's public URL at build time
      - key: BACKEND_BASE
        fromService:
          type: web
          name: friday-backend
          property: url


